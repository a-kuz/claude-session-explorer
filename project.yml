name: SessionExplorer
options:
  bundleIdPrefix: ai.enface
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: NO

targets:
  SessionExplorer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: Session Explorer
        CFBundleDisplayName: Session Explorer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.developer-tools
        NSAppleEventsUsageDescription: "Session Explorer открывает выбранную сессию в новой вкладке терминала."
    entitlements:
      path: Sources/SessionExplorer.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.enface.SessionExplorer
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"

schemes:
  SessionExplorer:
    build:
      targets:
        SessionExplorer: all
    run:
      config: Debug
    archive:
      config: Release
